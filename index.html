<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameVault Store</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* NAVBAR */

header{
width:100%;
padding:18px 8%;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:28px;
font-weight:700;
letter-spacing:1px;
}

.logo span{
color:#3b82f6;
}

.cart-box{
background:#1e293b;
padding:10px 18px;
border-radius:50px;
font-size:15px;
font-weight:500;
}

/* HERO */

.hero{
height:320px;
margin:40px 8%;
border-radius:24px;
background:
linear-gradient(to right,rgba(15,23,42,.95),rgba(15,23,42,.5)),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:60px;
}

.hero-text{
max-width:500px;
}

.hero-text h1{
font-size:52px;
line-height:1.1;
margin-bottom:18px;
}

.hero-text p{
color:#cbd5e1;
line-height:1.7;
margin-bottom:25px;
}

.hero-text button{
padding:14px 30px;
border:none;
background:#3b82f6;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.hero-text button:hover{
background:#2563eb;
}

/* PRODUCTS */

.section-title{
margin:50px 8% 25px;
font-size:32px;
font-weight:600;
}

.container{
padding:0 8% 50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:28px;
}

/* CARD */

.card{
background:#111827;
border-radius:20px;
overflow:hidden;
transition:.35s;
border:1px solid rgba(255,255,255,.06);
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.content{
padding:20px;
}

.content h3{
font-size:22px;
margin-bottom:8px;
}

.category{
font-size:14px;
color:#94a3b8;
margin-bottom:15px;
}

.price-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:18px;
}

.price{
font-size:22px;
font-weight:600;
color:#3b82f6;
}

.addBtn{
padding:10px 16px;
border:none;
background:#3b82f6;
color:white;
font-weight:500;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.addBtn:hover{
background:#2563eb;
}

/* CART */

.cart-section{
margin:20px 8% 60px;
background:#111827;
padding:30px;
border-radius:22px;
border:1px solid rgba(255,255,255,.06);
}

.cart-section h2{
margin-bottom:25px;
font-size:28px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.item-info h4{
font-size:18px;
margin-bottom:4px;
}

.item-info p{
color:#94a3b8;
font-size:14px;
}

.controls{
display:flex;
align-items:center;
gap:10px;
}

.small-btn{
width:34px;
height:34px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.small-btn:hover{
background:#334155;
}

.remove-btn{
width:auto;
padding:0 14px;
background:#ef4444;
}

.total{
margin-top:25px;
text-align:right;
font-size:28px;
font-weight:600;
color:#3b82f6;
}

/* MOBILE */

@media(max-width:768px){

.hero{
height:auto;
padding:40px 30px;
}

.hero-text h1{
font-size:38px;
}

.section-title{
font-size:26px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
Game<span>Vault</span>
</div>

<div class="cart-box">
🛒 Cart Items: <span id="count">0</span>
</div>

</header>

<section class="hero">

<div class="hero-text">

<h1>Upgrade Your Gaming Setup</h1>

<p>
Discover premium gaming accessories, consoles, and gear
built for performance and style.
</p>

<button>
Shop Now
</button>

</div>

</section>

<h2 class="section-title">
Featured Products
</h2>

<div class="container" id="products"></div>

<section class="cart-section">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<div class="total">
Total : ₹<span id="total">0</span>
</div>

</section>

<script>

const products=[

{
name:"PlayStation 5",
category:"Console",
price:55000,
image:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db?q=80&w=1200"
},

{
name:"Gaming Headset",
category:"Audio",
price:4800,
image:"https://pisces.bbystatic.com/image2/BestBuy_US/images/products/6298/6298660ld.jpg"
},

{
name:"Mechanical Keyboard",
category:"Accessories",
price:3500,
image:"https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?q=80&w=1200"
},

{
name:"Gaming Mouse",
category:"Accessories",
price:2200,
image:"https://images.unsplash.com/photo-1527814050087-3793815479db?q=80&w=1200"
},

{
name:"Gaming Chair",
category:"Furniture",
price:12000,
image:"https://images.unsplash.com/photo-1598550476439-6847785fcea6?q=80&w=1200"
},

{
name:"Xbox Controller",
category:"Controller",
price:4200,
image:"https://images.unsplash.com/photo-1606144042614-b2417e99c4e3?q=80&w=1200"
}

];

let cart=[];

displayProducts(products);

function displayProducts(items){

const productBox=document.getElementById("products");

items.forEach(item=>{

productBox.innerHTML+=`

<div class="card">

<img src="${item.image}">

<div class="content">

<h3>${item.name}</h3>

<div class="category">
${item.category}
</div>

<div class="price-row">

<div class="price">
₹${item.price}
</div>

<button class="addBtn"
onclick='addToCart("${item.name}",${item.price})'>
Add
</button>

</div>

</div>

</div>

`;

});

}

function addToCart(name,price){

let existing=cart.find(item=>item.name===name);

if(existing){

existing.quantity++;

}
else{

cart.push({
name:name,
price:price,
quantity:1
});

}

updateCart();

}

function increase(index){

cart[index].quantity++;

updateCart();

}

function decrease(index){

if(cart[index].quantity>1){

cart[index].quantity--;

}
else{

cart.splice(index,1);

}

updateCart();

}

function removeItem(index){

cart.splice(index,1);

updateCart();

}

function updateCart(){

let html="";
let total=0;
let count=0;

cart.forEach((item,index)=>{

count+=item.quantity;

total+=item.price*item.quantity;

html+=`

<div class="cart-item">

<div class="item-info">

<h4>${item.name}</h4>

<p>
₹${item.price} each
</p>

</div>

<div class="controls">

<button class="small-btn"
onclick="decrease(${index})">
-
</button>

<span>${item.quantity}</span>

<button class="small-btn"
onclick="increase(${index})">
+
</button>

<button class="small-btn remove-btn"
onclick="removeItem(${index})">
X
</button>

</div>

</div>

`;

});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("count").innerText=count;

}

</script>

</body>
</html>
