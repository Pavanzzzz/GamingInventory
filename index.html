<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>F1 Driver Stats</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0f19;
color:white;
min-height:100vh;
}

header{
padding:25px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#111827;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:28px;
font-weight:700;
}

.logo span{
color:#e10600;
}

.hero{
padding:80px 8% 50px;
text-align:center;
}

.hero h1{
font-size:56px;
margin-bottom:15px;
}

.hero p{
color:#9ca3af;
font-size:18px;
margin-bottom:35px;
}

.search-box{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
}

.search-box input{
width:350px;
padding:15px;
border:none;
border-radius:12px;
background:#1f2937;
color:white;
font-size:16px;
outline:none;
}

.search-box button{
padding:15px 24px;
border:none;
background:#e10600;
color:white;
font-size:16px;
font-weight:600;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.search-box button:hover{
background:#b30500;
}

.result{
width:85%;
max-width:900px;
margin:40px auto;
background:#111827;
border-radius:20px;
padding:35px;
display:none;
border:1px solid rgba(255,255,255,.08);
}

.driver-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:20px;
}

.driver-header h2{
font-size:36px;
}

.position{
background:#e10600;
padding:12px 20px;
border-radius:12px;
font-weight:600;
font-size:20px;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.stat-card{
background:#1f2937;
padding:24px;
border-radius:16px;
}

.stat-card h3{
font-size:15px;
color:#9ca3af;
margin-bottom:12px;
}

.stat-card p{
font-size:28px;
font-weight:600;
}

.error{
text-align:center;
margin-top:30px;
color:#ef4444;
font-size:18px;
}

footer{
margin-top:60px;
padding:25px;
text-align:center;
color:#6b7280;
font-size:14px;
}

@media(max-width:768px){

.hero h1{
font-size:38px;
}

.search-box input{
width:100%;
}

.result{
width:92%;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
F1<span>Stats</span>
</div>

</header>

<section class="hero">

<h1>Formula 1 Driver Statistics</h1>

<p>
Search current Formula 1 driver standings and championship stats
</p>

<div class="search-box">

<input type="text"
id="driverInput"
placeholder="Enter driver surname (example: verstappen)">

<button onclick="searchDriver()">
Search Driver
</button>

</div>

</section>

<div class="result" id="result">

<div class="driver-header">

<h2 id="driverName"></h2>

<div class="position">
Position #<span id="position"></span>
</div>

</div>

<div class="stats-grid">

<div class="stat-card">
<h3>Points</h3>
<p id="points"></p>
</div>

<div class="stat-card">
<h3>Wins</h3>
<p id="wins"></p>
</div>

<div class="stat-card">
<h3>Nationality</h3>
<p id="nationality"></p>
</div>

<div class="stat-card">
<h3>Constructor</h3>
<p id="constructor"></p>
</div>

</div>

</div>

<div class="error" id="error"></div>

<footer>

Powered by Ergast F1 API

</footer>

<script>

async function searchDriver(){

const input=document.getElementById("driverInput").value.toLowerCase();

const result=document.getElementById("result");

const error=document.getElementById("error");

result.style.display="none";
error.innerText="";

try{

const response=await fetch(
"https://ergast.com/api/f1/current/driverStandings.json"
);

const data=await response.json();

const standings=
data.MRData.StandingsTable.StandingsLists[0].DriverStandings;

const driver=standings.find(d =>
d.Driver.familyName.toLowerCase()===input
);

if(driver){

document.getElementById("driverName").innerText=
driver.Driver.givenName + " " + driver.Driver.familyName;

document.getElementById("position").innerText=
driver.position;

document.getElementById("points").innerText=
driver.points;

document.getElementById("wins").innerText=
driver.wins;

document.getElementById("nationality").innerText=
driver.Driver.nationality;

document.getElementById("constructor").innerText=
driver.Constructors[0].name;

result.style.display="block";

}
else{

error.innerText="Driver not found";

}

}
catch(err){

error.innerText="Failed to fetch F1 data";

}

}

</script>

</body>
</html>
