<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>F1 Driver Stats</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
color:white;
min-height:100vh;
}

/* NAVBAR */

header{
width:100%;
padding:22px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#0f172a;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:32px;
font-weight:700;
letter-spacing:1px;
}

.logo span{
color:#e10600;
}

/* HERO SECTION */

.hero{
padding:100px 20px 60px;
text-align:center;
}

.hero h1{
font-size:64px;
font-weight:700;
margin-bottom:18px;
}

.hero p{
font-size:18px;
color:#94a3b8;
margin-bottom:40px;
}

/* SEARCH */

.search-box{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.search-box input{
width:380px;
padding:16px 18px;
border:none;
border-radius:14px;
background:#1e293b;
color:white;
font-size:16px;
outline:none;
}

.search-box input::placeholder{
color:#94a3b8;
}

.search-box button{
padding:16px 28px;
border:none;
background:#e10600;
color:white;
font-size:16px;
font-weight:600;
border-radius:14px;
cursor:pointer;
transition:.3s;
}

.search-box button:hover{
background:#b30500;
}

/* RESULT CARD */

.result{
width:85%;
max-width:950px;
margin:40px auto;
background:#0f172a;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:35px;
display:none;
}

.driver-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:20px;
}

.driver-header h2{
font-size:40px;
}

.position{
background:#e10600;
padding:12px 22px;
border-radius:12px;
font-size:20px;
font-weight:600;
}

/* STATS GRID */

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:22px;
}

.stat-card{
background:#1e293b;
padding:28px;
border-radius:18px;
transition:.3s;
}

.stat-card:hover{
transform:translateY(-6px);
}

.stat-card h3{
font-size:15px;
font-weight:500;
color:#94a3b8;
margin-bottom:14px;
}

.stat-card p{
font-size:30px;
font-weight:700;
}

/* ERROR */

.error{
text-align:center;
margin-top:30px;
font-size:18px;
color:#ef4444;
}

/* FOOTER */

footer{
margin-top:60px;
padding:25px;
text-align:center;
font-size:14px;
color:#64748b;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:42px;
}

.hero p{
font-size:16px;
}

.search-box input{
width:100%;
max-width:400px;
}

.result{
width:92%;
padding:25px;
}

.driver-header h2{
font-size:30px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
F1<span>Stats</span>
</div>

</header>

<section class="hero">

<h1>Formula 1 Driver Statistics</h1>

<p>
Search current Formula 1 driver standings and championship stats
</p>

<div class="search-box">

<input
type="text"
id="driverInput"
placeholder="Enter driver surname (example: verstappen)"
>

<button onclick="searchDriver()">
Search Driver
</button>

</div>

</section>

<!-- RESULT -->

<div class="result" id="result">

<div class="driver-header">

<h2 id="driverName"></h2>

<div class="position">
Position #<span id="position"></span>
</div>

</div>

<div class="stats-grid">

<div class="stat-card">
<h3>Points</h3>
<p id="points"></p>
</div>

<div class="stat-card">
<h3>Wins</h3>
<p id="wins"></p>
</div>

<div class="stat-card">
<h3>Nationality</h3>
<p id="nationality"></p>
</div>

<div class="stat-card">
<h3>Constructor</h3>
<p id="constructor"></p>
</div>

</div>

</div>

<!-- ERROR -->

<div class="error" id="error"></div>

<footer>

Powered by Jolpica F1 API

</footer>

<script>

async function searchDriver(){

const input=document
.getElementById("driverInput")
.value
.trim()
.toLowerCase();

const result=document.getElementById("result");

const error=document.getElementById("error");

result.style.display="none";

error.innerText="";

if(input===""){

error.innerText="Please enter a driver name";

return;

}

try{

const response=await fetch(
"https://api.jolpi.ca/ergast/f1/current/driverStandings.json"
);

const data=await response.json();

const standings=
data.MRData
.StandingsTable
.StandingsLists[0]
.DriverStandings;

const driver=standings.find(d =>

d.Driver.familyName.toLowerCase()===input

);

if(driver){

document.getElementById("driverName").innerText=

driver.Driver.givenName +
" " +
driver.Driver.familyName;

document.getElementById("position").innerText=
driver.position;

document.getElementById("points").innerText=
driver.points;

document.getElementById("wins").innerText=
driver.wins;

document.getElementById("nationality").innerText=
driver.Driver.nationality;

document.getElementById("constructor").innerText=
driver.Constructors[0].name;

result.style.display="block";

}
else{

error.innerText="Driver not found";

}

}
catch(err){

error.innerText="Failed to fetch F1 data";

console.log(err);

}

}

/* ENTER KEY SUPPORT */

document
.getElementById("driverInput")
.addEventListener("keypress",function(event){

if(event.key==="Enter"){

searchDriver();

}

});

</script>

</body>
</html>
